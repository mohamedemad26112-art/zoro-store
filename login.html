<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">
        
        <form>
            
            <div class="text">
                <h1>Welcome</h1>
                <p>Sign in to your account</p>
            </div>

            <div class="user">
                <label>User name</label>
                <input type="email" placeholder="name@gmail.com" required>
                <img src="/image/envelope_526900.png" alt="">
            </div>

            <div class="pass">
                <label>Password</label>
                <input type="password" placeholder="**********" required>
                <img src="/image/confirm-password-1.png" alt="">
            </div>

            <div class="rem">
                <div class="check">
                    <input type="checkbox">
                    <label>Remember me</label>
                </div>
                <a href="#">Forget password?</a>
            </div>

            <!-- الزرار كـ link -->
            <div class="btn">
                <a href="home.html" class="btn-link">Sign in</a>
            </div>

            <div class="register">
                <a href="#">Don't have an account? Register</a>
            </div>

        </form>

    </div>

</body>
</html>
